name: Build e Publicar APK Android

on:
  push:
    tags:
      - 'apk-*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências do app
        working-directory: mobile-app
        run: npm ci

      - name: Gerar projeto Android nativo
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configurar Firebase (google-services)
        working-directory: mobile-app
        run: |
          cp google-services.json android/app/google-services.json
          sed -i "s|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')|classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')\n    classpath('com.google.gms:google-services:4.4.2')|" android/build.gradle
          sed -i "s|apply plugin: \"com.facebook.react\"|apply plugin: \"com.facebook.react\"\napply plugin: \"com.google.gms.google-services\"|" android/app/build.gradle
          sed -i 's/android:allowBackup="true"/android:allowBackup="false"/' android/app/src/main/AndroidManifest.xml

      - name: Criar bundle JS
        working-directory: mobile-app
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --dev false

      - name: Permissão Gradle
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Renomear APK
        run: mv mobile-app/android/app/build/outputs/apk/debug/app-debug.apk ChaveiroOS.apk

      - name: Publicar APK no GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG" --repo reidaschavesbc/chaveiro-system 2>/dev/null; then
            gh release upload "$TAG" ChaveiroOS.apk --clobber --repo reidaschavesbc/chaveiro-system
            gh release edit "$TAG" --draft=false --repo reidaschavesbc/chaveiro-system
          else
            gh release create "$TAG" ChaveiroOS.apk \
              --title "Release $TAG" \
              --notes "Release $TAG" \
              --latest=false \
              --repo reidaschavesbc/chaveiro-system
          fi

      - name: Copiar APK para VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H "$VPS_HOST" >> ~/.ssh/known_hosts
          VERSION=${TAG#apk-}
          ssh -p 2222 "$VPS_USER@$VPS_HOST" "export GH_TOKEN='${GH_TOKEN}' && gh release download ${TAG} --repo reidaschavesbc/chaveiro-system --pattern 'ChaveiroOS.apk' --dir /home/chaveiro/chaveiro-system/public/downloads/ --clobber && echo '{\"version\":\"'${VERSION}'\"}' > /home/chaveiro/chaveiro-system/public/downloads/version-apk.json"
