name: Build e Publicar APK Android

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências do app
        working-directory: mobile-app
        run: npm ci

      - name: Substituir URL do servidor
        working-directory: mobile-app
        run: sed -i "s|SERVER_URL_PLACEHOLDER|${{ secrets.SERVER_URL }}|g" services/api.js

      - name: Gerar projeto Android nativo
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Criar bundle JS
        working-directory: mobile-app
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --dev false

      - name: Permissão Gradle
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Renomear APK
        run: mv mobile-app/android/app/build/outputs/apk/debug/app-debug.apk ChaveiroOS.apk

      - name: Publicar APK no GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" ChaveiroOS.apk \
            --title "Release $TAG" \
            --notes "APK Android - Chaveiro OS" \
            --repo tvsxgames/chaveiro-system
