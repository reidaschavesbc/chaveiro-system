name: Build e Publicar APK Android

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências do app
        working-directory: mobile-app
        run: npm ci

      - name: Substituir URL do servidor
        working-directory: mobile-app
        run: sed -i "s|SERVER_URL_PLACEHOLDER|${{ secrets.SERVER_URL }}|g" services/api.js

      - name: Gerar projeto Android nativo
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Forçar bundle JS no APK
        working-directory: mobile-app/android
        run: echo "bundleInDebug=true" >> gradle.properties

      - name: Permissão Gradle
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Renomear APK
        run: mv mobile-app/android/app/build/outputs/apk/debug/app-debug.apk ChaveiroOS.apk

      - name: Enviar APK para o servidor
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          for i in 1 2 3; do
            scp -i /tmp/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              ChaveiroOS.apk ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/chaveiro-system/public/downloads/ChaveiroOS.apk \
              && echo "Enviado com sucesso" && break || echo "Tentativa $i falhou, aguardando..."
            sleep 10
          done
