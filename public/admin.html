<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }

    /* ─── LOGIN ─── */
    #view-login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 24px;
    }
    .login-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 20px;
      padding: 48px 44px; width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5); animation: fadeUp .4s ease;
    }
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
      color: #818cf8; font-size: 11px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; letter-spacing: .5px; margin-bottom: 24px;
    }
    .login-box h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .login-box p  { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600; color: #94a3b8;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    .field input {
      width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px;
      padding: 11px 14px; font-size: 14px; font-family: inherit; color: #f1f5f9; outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: #6366f1; }
    .field input::placeholder { color: #475569; }
    .btn-login {
      width: 100%; padding: 13px; background: #6366f1; color: white; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .2s, transform .15s; margin-top: 8px;
    }
    .btn-login:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .login-error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none;
    }

    /* ─── PAINEL ─── */
    #view-painel { display: none; min-height: 100vh; }
    .topbar {
      background: #1e293b; border-bottom: 1px solid #334155; padding: 0 32px;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left  { display: flex; align-items: center; gap: 12px; }
    .topbar-icon  { width: 32px; height: 32px; background: #6366f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .topbar-icon svg { width: 16px; height: 16px; fill: white; }
    .topbar-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .topbar-sub   { font-size: 12px; color: #64748b; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user  { display: flex; align-items: center; gap: 8px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 6px 12px; }
    .topbar-avatar { width: 28px; height: 28px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .topbar-nome  { font-size: 13px; font-weight: 500; color: #cbd5e1; }
    .btn-sair     { padding: 7px 14px; background: transparent; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; font-size: 13px; font-family: inherit; cursor: pointer; transition: all .2s; }
    .btn-sair:hover { background: #334155; color: #f1f5f9; }

    .painel-body  { padding: 32px; max-width: 900px; margin: 0 auto; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-title  { font-size: 20px; font-weight: 700; color: #f1f5f9; }
    .section-sub    { font-size: 13px; color: #64748b; margin-top: 3px; }

    .btn-novo {
      display: flex; align-items: center; gap: 8px; padding: 9px 18px;
      background: #6366f1; color: white; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .2s, transform .15s;
    }
    .btn-novo:hover { background: #4f46e5; transform: translateY(-1px); }

    /* ─── LOJA CARD ─── */
    .loja-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      margin-bottom: 20px; overflow: hidden;
    }
    .loja-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: #0f172a; border-bottom: 1px solid #334155;
    }
    .loja-header-left { display: flex; align-items: center; gap: 12px; }
    .loja-icon {
      width: 36px; height: 36px; background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.3);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .loja-icon svg { width: 18px; height: 18px; fill: #818cf8; }
    .loja-nome  { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .loja-meta  { font-size: 12px; color: #64748b; margin-top: 2px; }
    .loja-acoes { display: flex; gap: 8px; align-items: center; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-ativo   { background: rgba(34,197,94,.15);  color: #4ade80; }
    .badge-inativo { background: rgba(239,68,68,.15);  color: #f87171; }
    .badge-principal { background: rgba(99,102,241,.15); color: #818cf8; }
    .badge-sub     { background: rgba(100,116,139,.15); color: #94a3b8; }

    /* ─── USUARIOS TABLE ─── */
    .usuarios-table { width: 100%; border-collapse: collapse; }
    .usuarios-table th {
      padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600;
      color: #475569; text-transform: uppercase; letter-spacing: .5px; background: #1e293b;
    }
    .usuarios-table td { padding: 12px 16px; font-size: 13px; color: #cbd5e1; vertical-align: middle; border-top: 1px solid #1e293b; }
    .usuarios-table tr { border-top: 1px solid #334155; }
    .usuarios-table tr:hover td { background: rgba(99,102,241,.04); }
    .td-nome { font-weight: 600; color: #f1f5f9; }
    .td-email { color: #64748b; font-size: 12px; }

    .add-sub-row { padding: 12px 16px; border-top: 1px solid #334155; }

    .btn-add-sub {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: transparent; border: 1px dashed #334155;
      border-radius: 8px; color: #64748b; font-size: 12px; font-family: inherit;
      cursor: pointer; transition: all .2s;
    }
    .btn-add-sub:hover { border-color: #6366f1; color: #818cf8; background: rgba(99,102,241,.05); }

    .acoes { display: flex; gap: 6px; }
    .btn-acao {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; font-family: inherit;
      cursor: pointer; border: 1px solid #334155; background: #0f172a; color: #94a3b8; transition: all .15s;
    }
    .btn-acao:hover { background: #334155; color: #f1f5f9; }
    .btn-acao.danger { border-color: rgba(239,68,68,.3); color: #f87171; }
    .btn-acao.danger:hover { background: rgba(239,68,68,.15); }
    .btn-acao.success { border-color: rgba(34,197,94,.3); color: #4ade80; }
    .btn-acao.success:hover { background: rgba(34,197,94,.1); }
    .btn-acao.loja { border-color: #334155; color: #94a3b8; font-size: 11px; }

    .empty-loja { padding: 24px 16px; color: #475569; font-size: 13px; text-align: center; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 16px;
      animation: fadeIn .2s ease;
    }
    .modal {
      background: #1e293b; border: 1px solid #334155; border-radius: 18px;
      width: 100%; max-width: 460px; box-shadow: 0 24px 64px rgba(0,0,0,.6); animation: fadeUp .25s ease;
      display: flex; flex-direction: column; max-height: calc(100vh - 32px);
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid #334155; flex-shrink: 0; }
    .modal-title  { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .modal-close  { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; transition: color .15s; }
    .modal-close:hover { color: #f1f5f9; }
    .modal-body   { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 16px 24px 20px; border-top: 1px solid #334155; flex-shrink: 0; }
    .modal-divider { border: none; border-top: 1px dashed #334155; margin: 16px 0; }
    .modal-section { font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

    .m-field { margin-bottom: 14px; }
    .m-field label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .m-field input, .m-field select {
      width: 100%; background: #0f172a; border: 1.5px solid #334155; border-radius: 9px;
      padding: 10px 13px; font-size: 14px; font-family: inherit; color: #f1f5f9; outline: none; transition: border-color .2s;
    }
    .m-field input:focus, .m-field select:focus { border-color: #6366f1; }
    .m-field input::placeholder { color: #475569; }
    .m-field select option { background: #1e293b; }
    .m-erro { color: #f87171; font-size: 12px; min-height: 16px; margin-top: 6px; }

    .btn-modal { padding: 9px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .2s; }
    .btn-modal.secondary { background: transparent; border: 1px solid #334155; color: #94a3b8; }
    .btn-modal.secondary:hover { background: #334155; color: #f1f5f9; }
    .btn-modal.primary { background: #6366f1; border: none; color: white; }
    .btn-modal.primary:hover { background: #4f46e5; }

    /* ─── TOAST ─── */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 99999; display: none; }
    #toast-inner { padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; color: white; box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: fadeUp .25s ease; }

    .empty-state { text-align: center; padding: 60px 24px; color: #475569; }
    .empty-state p { font-size: 15px; margin-bottom: 6px; }
    .empty-state small { font-size: 13px; }

    @keyframes fadeUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }

    /* ─── FINANCEIRO ─── */
    #view-financeiro { display: none; min-height: 100vh; flex-direction: column; }
    .fin-topbar {
      background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px;
      height: 56px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .fin-back {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: transparent; border: 1px solid #334155; border-radius: 8px;
      color: #94a3b8; font-size: 13px; font-family: inherit; cursor: pointer; transition: all .2s;
      white-space: nowrap;
    }
    .fin-back:hover { background: #334155; color: #f1f5f9; }
    .fin-loja-nome { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .fin-loja-sub  { font-size: 11px; color: #64748b; }

    .fin-tabs {
      background: #0f172a; border-bottom: 1px solid #1e293b;
      display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none; padding: 10px 16px;
    }
    .fin-tabs::-webkit-scrollbar { display: none; }
    .fin-tab {
      padding: 7px 16px; font-size: 13px; font-weight: 600; color: #94a3b8;
      cursor: pointer; border: none; background: #1e293b; font-family: inherit;
      border-radius: 8px; white-space: nowrap; transition: all .2s;
    }
    .fin-tab:hover { background: #273549; color: #e2e8f0; }
    .fin-tab.ativa { background: #2563eb; color: #fff; }

    .fin-body { flex: 1; padding: 28px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* Cards de stat */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 14px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .stat-val   { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .stat-sub   { font-size: 11px; color: #64748b; margin-top: 3px; }
    .stat-card.destaque { border-color: rgba(99,102,241,.4); background: rgba(99,102,241,.08); }
    .stat-card.alerta   { border-color: rgba(239,68,68,.3); }
    .stat-card.ok       { border-color: rgba(34,197,94,.3); }

    /* Tabelas financeiras */
    .fin-section-title { font-size: 14px; font-weight: 700; color: #f1f5f9; margin: 24px 0 12px; }
    .fin-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #334155; }
    .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .fin-table th {
      background: #0f172a; padding: 10px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .5px;
      white-space: nowrap;
    }
    .fin-table td { padding: 11px 14px; color: #cbd5e1; border-top: 1px solid #1e293b; vertical-align: middle; }
    .fin-table tr:hover td { background: rgba(99,102,241,.04); }
    .fin-table .n { color: #f1f5f9; font-weight: 600; }
    .fin-table .sub { font-size: 11px; color: #64748b; }

    .st-badge { display: inline-flex; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .st-aberta      { background: rgba(251,191,36,.15); color: #fbbf24; }
    .st-em_andamento{ background: rgba(99,102,241,.15); color: #818cf8; }
    .st-reagendar   { background: rgba(168,85,247,.15); color: #c084fc; }
    .st-concluida   { background: rgba(34,197,94,.15);  color: #4ade80; }
    .st-cancelada   { background: rgba(239,68,68,.15);  color: #f87171; }
    .st-pendente    { background: rgba(251,191,36,.15); color: #fbbf24; }
    .st-comprado    { background: rgba(34,197,94,.15);  color: #4ade80; }

    .fin-filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .fin-filtros input, .fin-filtros select {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 7px 12px; font-size: 13px; font-family: inherit; color: #f1f5f9; outline: none;
    }
    .fin-filtros input:focus, .fin-filtros select:focus { border-color: #6366f1; }
    .fin-btn {
      padding: 7px 16px; background: #6366f1; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .fin-btn:hover { background: #4f46e5; }
    .fin-btn.sec { background: #334155; }
    .fin-btn.sec:hover { background: #475569; }

    .fin-empty { text-align: center; padding: 40px; color: #475569; font-size: 13px; }
    .fin-loading { text-align: center; padding: 40px; color: #475569; font-size: 13px; }

    @media (max-width: 640px) {
      .fin-body { padding: 14px; }
      .fin-topbar { padding: 0 12px; }
      .fin-loja-sub { display: none; }
    }

    @media (max-width: 640px) {
      .topbar { padding: 0 14px; }
      .topbar-nome { display: none; }
      .topbar-sub { display: none; }
      .painel-body { padding: 16px 12px; }
      .login-box { padding: 32px 20px; }

      .section-header { flex-wrap: wrap; gap: 10px; }

      .loja-header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px; }
      .loja-header-left { width: 100%; }
      .loja-acoes { flex-wrap: wrap; width: 100%; gap: 6px; }
      .loja-acoes .btn-acao { flex: 1; min-width: 60px; text-align: center; }

      .loja-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .usuarios-table { min-width: 460px; }
      .col-tipo { display: none; }

      .add-sub-row { padding: 10px 14px; }

      .acoes { flex-wrap: wrap; }

      .modal-header { padding: 16px 18px 14px; }
      .modal-body   { padding: 16px 18px; }
      .modal-footer { padding: 14px 18px 18px; gap: 8px; }
      .modal-footer .btn-modal { flex: 1; text-align: center; }

      #toast { bottom: 16px; right: 12px; left: 12px; }
      #toast-inner { text-align: center; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div id="view-login">
  <div class="login-box">
    <div class="login-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      ACESSO RESTRITO
    </div>
    <h1>Painel Admin</h1>
    <p>Entre com sua conta de administrador</p>
    <div class="login-error" id="login-erro"></div>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="l-usuario" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="l-senha" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-entrar">Entrar no painel</button>
  </div>
</div>

<!-- ── PAINEL ──────────────────────────────────────────────────────────────── -->
<div id="view-painel">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <div>
        <div class="topbar-title">Painel Admin</div>
        <div class="topbar-sub" id="p-sub">Gestão de lojas e usuários</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="p-avatar">A</div>
        <span class="topbar-nome" id="p-nome">Admin</span>
      </div>
      <button onclick="abrirConfig()" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;margin-right:6px">⚙️ Config</button>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="painel-body">
    <div class="section-header">
      <div>
        <div class="section-title">Lojas</div>
        <div class="section-sub" id="p-contagem">Carregando...</div>
      </div>
      <button class="btn-novo" onclick="abrirModalNovaLoja()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Nova Loja
      </button>
    </div>

    <div id="lojas-lista"></div>

    <div class="section-header" style="margin-top:32px">
      <div>
        <div class="section-title">WhatsApp</div>
        <div class="section-sub">Conexão global do bot de mensagens</div>
      </div>
    </div>
    <div id="wa-admin-body" style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px">
      <p style="color:#94a3b8;font-size:13px">Carregando...</p>
    </div>
  </div>
</div>

<!-- ── FINANCEIRO ──────────────────────────────────────────────────────────── -->
<div id="view-financeiro" style="display:none;flex-direction:column;min-height:100vh">
  <div class="fin-topbar">
    <button class="fin-back" onclick="voltarAdmin()">← Lojas</button>
    <div style="flex:1;min-width:0">
      <div class="fin-loja-nome" id="fin-loja-nome">—</div>
      <div class="fin-loja-sub">Painel Financeiro — Admin</div>
    </div>
    <div id="fin-ponto-wrap" style="display:none;align-items:center;gap:8px">
      <label style="font-size:12px;color:#94a3b8;white-space:nowrap">Ponto:</label>
      <select id="fin-ponto-sel" onchange="finFiltrarPonto(this.value)" style="background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer"></select>
    </div>
  </div>
  <div class="fin-tabs" id="fin-tabs">
    <button class="fin-tab ativa" onclick="finNavegar('geral')">📊 Geral</button>

<!-- ── TOAST ──────────────────────────────────────────────────────────────── -->
<div id="toast"><div id="toast-inner"></div></div>

<script>
  const API = '/api';
  let _token = sessionStorage.getItem('admin_token');
  let _user  = null;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function authH() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token }; }

  async function req(method, path, body) {
    const opts = { method, headers: authH() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Erro na requisição');
    return data;
  }

  function toast(msg, type = 'success') {
    const colors = { success: '#16a34a', error: '#dc2626', warning: '#d97706' };
    document.getElementById('toast-inner').style.background = colors[type] || colors.success;
    document.getElementById('toast-inner').textContent = msg;
    document.getElementById('toast').style.display = 'block';
    clearTimeout(window._t);
    window._t = setTimeout(() => document.getElementById('toast').style.display = 'none', 3000);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtData(str) {
    if (!str) return '-';
    return str.slice(0,10).split('-').reverse().join('/');
  }

  function sair() {
    sessionStorage.removeItem('admin_token');
    document.getElementById('view-painel').style.display = 'none';
    document.getElementById('view-login').style.display = 'flex';
    _token = null; _user = null;
  }

  // ── Login ────────────────────────────────────────────────────────────────
  async function fazerLogin() {
    const btn  = document.getElementById('btn-entrar');
    const erro = document.getElementById('login-erro');
    const usuario = document.getElementById('l-usuario').value.trim();
    const senha   = document.getElementById('l-senha').value;
    if (!usuario || !senha) { mostrarErroLogin('Preencha todos os campos'); return; }
    btn.textContent = 'Entrando...'; btn.disabled = true; erro.style.display = 'none';
    try {
      const res  = await fetch(API + '/auth/admin-login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario, senha }) });
      const data = await res.json();
      if (!data.token) throw new Error(data.error || 'Credenciais inválidas');
      if (data.user.perfil !== 'admin') throw new Error('Acesso negado — apenas administradores podem entrar aqui');
      _token = data.token; _user = data.user;
      sessionStorage.setItem('admin_token', _token);
      entrarNoPainel();
    } catch (e) { mostrarErroLogin(e.message); }
    finally { btn.textContent = 'Entrar no painel'; btn.disabled = false; }
  }

  function mostrarErroLogin(msg) {
    const erro = document.getElementById('login-erro');
    erro.textContent = msg; erro.style.display = 'block';
  }

  function entrarNoPainel() {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-painel').style.display = 'block';
    document.getElementById('p-avatar').textContent = _user.nome.charAt(0).toUpperCase();
    document.getElementById('p-nome').textContent = _user.nome;
    carregarLojas();
    _pollWA();
  }

  // ── Lojas ────────────────────────────────────────────────────────────────
  let _lojas = [];

  async function carregarLojas() {
    try {
      _lojas = await req('GET', '/lojas');
      renderLojas();
    } catch (e) {
      document.getElementById('lojas-lista').innerHTML = `<div style="color:#f87171;padding:24px">${e.message}</div>`;
    }
  }

  function renderLojas() {
    const total = _lojas.length;
    const totalUsuarios = _lojas.reduce((s, l) => s + l.usuarios.length, 0);
    document.getElementById('p-contagem').textContent = `${total} loja(s) · ${totalUsuarios} usuário(s)`;

    if (!total) {
      document.getElementById('lojas-lista').innerHTML = `
        <div class="empty-state">
          <p>Nenhuma loja cadastrada ainda</p>
          <small>Clique em "Nova Loja" para começar</small>
        </div>`;
      return;
    }

    document.getElementById('lojas-lista').innerHTML = _lojas.map(l => `
      <div class="loja-card">
        <div class="loja-header">
          <div class="loja-header-left">
            <div class="loja-icon">
              <svg viewBox="0 0 24 24"><path d="M20 4H4v2l8 5 8-5V4zM4 13h16v7H4z"/></svg>
            </div>
            <div>
              <div class="loja-nome">${esc(l.nome)}</div>
              <div class="loja-meta">${l.usuarios.length} usuário(s) · cadastrada em ${fmtData(l.criado_em)}</div>
            </div>
          </div>
          <div class="loja-acoes">
            <span class="badge badge-${l.ativo ? 'ativo' : 'inativo'}">${l.ativo ? 'Ativa' : 'Inativa'}</span>
            <button class="btn-acao loja" onclick="abrirModalEditarLoja(${l.id}, '${esc(l.nome)}')">Editar</button>
            <button class="btn-acao loja" onclick="abrirModalNfse(${l.id}, '${esc(l.nome)}')">NFS-e</button>
            <button class="btn-acao loja" onclick="abrirFinanceiro(${l.id}, '${esc(l.nome)}')">Financeiro</button>
            <button class="btn-acao loja ${l.ativo ? 'danger' : 'success'}" onclick="toggleLoja(${l.id}, ${l.ativo})">
              ${l.ativo ? 'Desativar' : 'Ativar'}
            </button>
            <button class="btn-acao loja danger" onclick="excluirLoja(${l.id}, '${esc(l.nome)}')">Excluir</button>
          </div>
        </div>

        ${l.usuarios.length ? `
        <div class="loja-table-wrap">
        <table class="usuarios-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail / Login</th>
              <th class="col-tipo">Tipo</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${l.usuarios.map(u => `
            <tr>
              <td class="td-nome">${esc(u.nome)}</td>
              <td class="td-email">${esc(u.email)}</td>
              <td class="col-tipo"><span class="badge badge-${u.principal ? 'principal' : 'sub'}">${u.principal ? 'Usuário' : 'Sub-usuário'}</span></td>
              <td><span class="badge badge-${u.ativo ? 'ativo' : 'inativo'}">${u.ativo ? 'Ativo' : 'Inativo'}</span></td>
              <td>
                <div class="acoes">
                  <button class="btn-acao" onclick='abrirModalEditarUsuario(${JSON.stringify(u)})'>Editar</button>
                  <button class="btn-acao" onclick="abrirModalSenha(${u.id}, '${esc(u.nome)}')">Senha</button>
                  <button class="btn-acao ${u.ativo ? 'danger' : 'success'}" onclick="toggleUsuario(${u.id}, ${u.ativo})">
                    ${u.ativo ? 'Desativar' : 'Ativar'}
                  </button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
        </div>` : `<div class="empty-loja">Nenhum usuário nesta loja</div>`}

        <div class="add-sub-row">
          <button class="btn-add-sub" onclick="abrirModalSubUsuario(${l.id}, '${esc(l.nome)}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Adicionar sub-usuário
          </button>
        </div>
      </div>`).join('');
  }

  // ── Modal nova loja ──────────────────────────────────────────────────────
  function abrirModalNovaLoja() {
    const ov = criarOverlay(`
      <div class="modal-header">
        <span class="modal-title">Nova Loja</span>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">Dados da loja</div>
        <div class="m-field">
          <label>Nome da loja</label>
          <input type="text" id="nl-nome" autocomplete="off">
        </div>
        <hr class="modal-divider">
        <div class="modal-section">Usuário principal</div>
        <div class="m-field">
          <label>Nome do responsável</label>
          <input type="text" id="nl-usnome" autocomplete="off">
        </div>
        <div class="m-field">
          <label>E-mail / Login</label>
          <input type="text" id="nl-email" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Senha</label>
          <input type="password" id="nl-senha" autocomplete="new-password">
        </div>
        <div class="m-erro" id="nl-erro"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn-modal primary" onclick="salvarNovaLoja()">Criar Loja</button>
      </div>`);
    ov.querySelector('#nl-nome').focus();
  }

  async function salvarNovaLoja() {
    const nome_loja    = document.getElementById('nl-nome').value.trim();
    const nome_usuario = document.getElementById('nl-usnome').value.trim();
    const email        = document.getElementById('nl-email').value.trim();
    const senha        = document.getElementById('nl-senha').value;
    const erro         = document.getElementById('nl-erro');

    if (!nome_loja || !nome_usuario || !email || !senha) { erro.textContent = 'Preencha todos os campos'; return; }
    if (senha.length < 4) { erro.textContent = 'A senha deve ter pelo menos 4 caracteres'; return; }

    try {
      await req('POST', '/lojas', { nome_loja, nome_usuario, email, senha });
      fecharModal(); toast('Loja criada com sucesso!'); carregarLojas();
    } catch (e) { erro.textContent = e.message; }
  }

  // ── Modal editar loja ────────────────────────────────────────────────────
  function abrirModalEditarLoja(id, nome) {
    const ov = criarOverlay(`
      <div class="modal-header">
        <span class="modal-title">Editar Loja</span>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="m-field">
          <label>Nome da loja</label>
          <input type="text" id="el-nome" value="${esc(nome)}" autocomplete="off">
        </div>
        <div class="m-erro" id="el-erro"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn-modal primary" onclick="salvarEditarLoja(${id})">Salvar</button>
      </div>`);
    ov.querySelector('#el-nome').focus();
  }

  async function salvarEditarLoja(id) {
    const nome = document.getElementById('el-nome').value.trim();
    const erro = document.getElementById('el-erro');
    if (!nome) { erro.textContent = 'Informe o nome da loja'; return; }
    try {
      await req('PUT', `/lojas/${id}`, { nome });
      fecharModal(); toast('Loja atualizada!'); carregarLojas();
    } catch (e) { erro.textContent = e.message; }
  }

  // ── Excluir loja ─────────────────────────────────────────────────────────
  async function excluirLoja(id, nome) {
    if (!confirm(`Tem certeza que deseja EXCLUIR permanentemente a loja "${nome}"?\n\nIsso apagará todos os usuários desta loja. Esta ação não pode ser desfeita.`)) return;
    try {
      await req('DELETE', `/lojas/${id}`);
      toast('Loja excluída!'); carregarLojas();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ── Modal NFS-e por loja ─────────────────────────────────────────────────
  async function abrirModalNfse(lojaId, lojaNome) {
    let cfg = {};
    try { cfg = await req('GET', `/nfse/admin-config/${lojaId}`); } catch (_) {}
    const v = k => esc(cfg[k] || '');
    const sel = (k, val) => cfg[k] === val ? 'selected' : '';

    const ov = criarOverlay(`
      <div class="modal-header">
        <span class="modal-title">NFS-e — ${esc(lojaNome)}</span>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">Prestador</div>
        <div class="m-field">
          <label>CNPJ</label>
          <input type="text" id="nf-cnpj" value="${v('nfse_cnpj')}" placeholder="00000000000000" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Inscrição Municipal</label>
          <input type="text" id="nf-im" value="${v('nfse_inscricao_municipal')}" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Regime Tributário</label>
          <select id="nf-regime">
            <option value="mei" ${sel('nfse_regime_tributario','mei')}>MEI</option>
            <option value="simples" ${sel('nfse_regime_tributario','simples')}>Simples Nacional</option>
            <option value="normal" ${sel('nfse_regime_tributario','normal')}>Regime Normal</option>
          </select>
        </div>
        <hr class="modal-divider">
        <div class="modal-section">Tributação</div>
        <div class="m-field">
          <label>Alíquota ISS (%)</label>
          <input type="text" id="nf-aliq" value="${v('nfse_aliquota_iss') || '2.00'}" placeholder="2.00" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Código Tributação Nacional</label>
          <input type="text" id="nf-cod-nac" value="${v('nfse_cod_trib_nac')}" placeholder="240101" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Código Tributação Municipal (opcional)</label>
          <input type="text" id="nf-cod-mun" value="${v('nfse_cod_trib_mun')}" autocomplete="off">
        </div>
        <div class="m-field">
          <label>CNAE (opcional)</label>
          <input type="text" id="nf-cnae" value="${v('nfse_cnae')}" autocomplete="off">
        </div>
        <hr class="modal-divider">
        <div class="modal-section">Certificado Digital</div>
        <div class="m-field">
          <label>Arquivo .pfx</label>
          <div id="nf-pfx-status" style="font-size:12px;color:#94a3b8;margin-bottom:6px">
            ${cfg.nfse_pfx_path ? `<span style="color:#4ade80">&#10003; Certificado enviado</span>` : '<span style="color:#f87171">Nenhum certificado</span>'}
          </div>
          <input type="file" id="nf-pfx-file" accept=".pfx" style="display:none">
          <button type="button" onclick="document.getElementById('nf-pfx-file').click()" style="padding:7px 14px;background:#334155;color:#cbd5e1;border:1px solid #475569;border-radius:7px;font-size:13px;cursor:pointer">
            Selecionar arquivo .pfx
          </button>
          <span id="nf-pfx-nome" style="font-size:12px;color:#94a3b8;margin-left:8px"></span>
        </div>
        <div class="m-field">
          <label>Senha do certificado</label>
          <input type="password" id="nf-pfx-senha" value="${v('nfse_pfx_senha')}" autocomplete="new-password">
        </div>
        <hr class="modal-divider">
        <div class="modal-section">Ambiente</div>
        <div class="m-field">
          <label>Ambiente de emissão</label>
          <select id="nf-amb">
            <option value="2" ${sel('nfse_ambiente','2')}>Homologação (testes)</option>
            <option value="1" ${sel('nfse_ambiente','1')}>Produção</option>
          </select>
        </div>
        <div class="m-erro" id="nf-erro"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn-modal primary" onclick="salvarNfseConfig(${lojaId})">Salvar</button>
      </div>`, { fecharAoClicarFora: false });

    ov.querySelector('#nf-pfx-file').addEventListener('change', function() {
      const nome = this.files[0] ? this.files[0].name : '';
      document.getElementById('nf-pfx-nome').textContent = nome;
    });
  }

  async function salvarNfseConfig(lojaId) {
    const erro = document.getElementById('nf-erro');
    erro.textContent = '';
    try {
      // Upload do .pfx se um arquivo foi selecionado
      const pfxFile = document.getElementById('nf-pfx-file').files[0];
      if (pfxFile) {
        const fd = new FormData();
        fd.append('pfx', pfxFile);
        const r = await fetch(API + `/nfse/admin-config/${lojaId}/pfx`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + _token },
          body: fd,
        });
        if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Erro no upload do certificado'); }
      }

      // Salvar demais configurações
      await req('POST', `/nfse/admin-config/${lojaId}`, {
        nfse_cnpj:                document.getElementById('nf-cnpj').value.trim(),
        nfse_inscricao_municipal: document.getElementById('nf-im').value.trim(),
        nfse_regime_tributario:   document.getElementById('nf-regime').value,
        nfse_aliquota_iss:        document.getElementById('nf-aliq').value.trim(),
        nfse_cod_trib_nac:        document.getElementById('nf-cod-nac').value.trim(),
        nfse_cod_trib_mun:        document.getElementById('nf-cod-mun').value.trim(),
        nfse_cnae:                document.getElementById('nf-cnae').value.trim(),
        nfse_pfx_senha:           document.getElementById('nf-pfx-senha').value,
        nfse_ambiente:            document.getElementById('nf-amb').value,
      });
      fecharModal();
      toast('Configurações de NFS-e salvas!');
    } catch (e) {
      erro.textContent = e.message;
    }
  }

  // ── Toggle loja ──────────────────────────────────────────────────────────
  async function toggleLoja(id, ativoAtual) {
    if (!confirm(`Deseja ${ativoAtual ? 'desativar' : 'ativar'} esta loja?`)) return;
    try {
      await req('PUT', `/lojas/${id}`, { ativo: !ativoAtual });
      toast(`Loja ${ativoAtual ? 'desativada' : 'ativada'}!`); carregarLojas();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ── Modal sub-usuário ────────────────────────────────────────────────────
  function abrirModalSubUsuario(loja_id, loja_nome) {
    const ov = criarOverlay(`
      <div class="modal-header">
        <span class="modal-title">Novo Sub-usuário</span>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:#64748b;font-size:13px;margin-bottom:16px">Adicionando sub-usuário à loja <strong style="color:#818cf8">${esc(loja_nome)}</strong></p>
        <div class="m-field">
          <label>Nome</label>
          <input type="text" id="su-nome" autocomplete="off">
        </div>
        <div class="m-field">
          <label>E-mail / Login</label>
          <input type="text" id="su-email" autocomplete="off">
        </div>
        <div class="m-field">
          <label>Senha</label>
          <input type="password" id="su-senha" autocomplete="new-password">
        </div>
        <div class="m-erro" id="su-erro"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn-modal primary" onclick="salvarSubUsuario(${loja_id})">Criar Sub-usuário</button>
      </div>`);

  // ── Overlay ──────────────────────────────────────────────────────────────
  function criarOverlay(conteudo, { fecharAoClicarFora = true } = {}) {
    fecharModal();
    const ov = document.createElement('div');
    ov.className = 'modal-overlay'; ov.id = 'modal-ativo';
    ov.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${conteudo}</div>`;
    if (fecharAoClicarFora) {
      let _mdTarget = null;
      ov.addEventListener('mousedown', e => { _mdTarget = e.target; });
      ov.addEventListener('mouseup',   e => { if (_mdTarget === ov && e.target === ov) fecharModal(); _mdTarget = null; });
    }
    document.body.appendChild(ov);
    return ov;
  }

  function fecharModal() { const ov = document.getElementById('modal-ativo'); if (ov) ov.remove(); }

  // ── WhatsApp ─────────────────────────────────────────────────────────────
  let _waTimer = null;
  function _renderWA({ status, qr }) {
    const el = document.getElementById('wa-admin-body');

      conectado:    { cor: '#4ade80', texto: '● Conectado',      sub: 'Bot ativo e enviando mensagens.' },

      qr_pendente:  { cor: '#818cf8', texto: '◉ QR Code pronto', sub: 'Escaneie com o WhatsApp do bot.' },
      desconectado: { cor: '#f87171', texto: '○ Desconectado',   sub: 'Clique em Conectar para iniciar.' },
    };

    el.innerHTML = `

        ${status === 'desconectado' || status === 'qr_pendente' ? `<button onclick="waAdminConectar()" style="padding:9px 18px;background:#818cf8;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Conectar</button>` : ''}
        ${status === 'conectado' ? `<button onclick="waAdminDesconectar()" style="padding:9px 18px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Desconectar</button>` : ''}
        <button onclick="waAdminTrocar()" style="padding:9px 18px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">↔ Trocar Conta</button>
      </div>`;
  }
  async function _pollWA() {
    try { const d = await req('GET', '/whatsapp/status'); _renderWA(d); } catch (_) {}
    const d = document.getElementById('wa-admin-body');
    if (!d) return;
    const status = d.querySelector('[style*="Conectado"]') ? 'conectado' : 'outro';
    _waTimer = setTimeout(_pollWA, status === 'conectado' ? 10000 : 3000);

  async function waAdminConectar() { try { await req('POST', '/whatsapp/conectar'); _pollWA(); } catch (e) { toast(e.message, 'error'); } }
  async function waAdminDesconectar() { if (!confirm('Desconectar o WhatsApp?')) return; try { await req('POST', '/whatsapp/desconectar'); toast('Desconectado'); _pollWA(); } catch (e) { toast(e.message, 'error'); } }
  async function waAdminTrocar() { if (!confirm('Isso apaga a sessão atual e gera novo QR. Continuar?')) return; try { await req('POST', '/whatsapp/trocar-conta'); toast('Aguarde o novo QR...'); _pollWA(); } catch (e) { toast(e.message, 'error'); } }

  // ── Financeiro ───────────────────────────────────────────────────────────
  let _lojaToken = null;
  let _finTabAtiva = 'dashboard';
  let _filtroUsuario = null; // null = todos, número = sub-usuário específico

  function reqLoja(method, path, body) {
    let fullPath = path;
    if (method === 'GET' && _filtroUsuario) {
      fullPath += (path.includes('?') ? '&' : '?') + 'usuario_id=' + _filtroUsuario;
    }
    const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _lojaToken } };
    if (body) opts.body = JSON.stringify(body);
    return fetch(API + fullPath, opts).then(r => r.json().then(d => { if (!r.ok) throw new Error(d.error || 'Erro'); return d; }));
  }

  function fmtV(v) { return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.', ','); }
  function fmtDT(s) { if (!s) return '—'; return String(s).slice(0,10).split('-').reverse().join('/'); }
  function fmtDH(s) { if (!s) return '—'; const p = String(s).slice(0,16).replace('T',' '); const [d,h]=p.split(' '); return d.split('-').reverse().join('/')+(h?' '+h:''); }

  async function abrirFinanceiro(lojaId, lojaNome) {
    try {
      const { token } = await req('POST', '/auth/acesso-loja', { loja_id: lojaId });
      _lojaToken = token;
      _filtroUsuario = null;
      document.getElementById('fin-loja-nome').textContent = lojaNome;
      document.getElementById('view-painel').style.display = 'none';
      const vf = document.getElementById('view-financeiro');
      vf.style.display = 'flex';

      // Carrega sub-usuários da loja para o seletor de ponto
      const wrap = document.getElementById('fin-ponto-wrap');
      const sel = document.getElementById('fin-ponto-sel');
      try {
        const pontos = await reqLoja('GET', '/usuarios/pontos');
        if (pontos.length > 1) {
          sel.innerHTML = '<option value="">Todos os pontos</option>' +
            pontos.map(p => `<option value="${p.id}">${p.nome}${p.principal ? ' (principal)' : ''}</option>`).join('');
          wrap.style.display = 'flex';
        } else {
          wrap.style.display = 'none';
        }
      } catch (_) { wrap.style.display = 'none'; }

      finNavegar('geral');
    } catch (e) { toast(e.message, 'error'); }
  }

  function finFiltrarPonto(val) {
    _filtroUsuario = val ? parseInt(val) : null;
    finNavegar(_finTabAtiva);
  }

  function voltarAdmin() {
    _lojaToken = null;
    _filtroUsuario = null;
    document.getElementById('fin-ponto-wrap').style.display = 'none';
    document.getElementById('view-financeiro').style.display = 'none';
    document.getElementById('view-painel').style.display = 'block';
  }

  function finNavegar(tab) {
    _finTabAtiva = tab;
    document.querySelectorAll('.fin-tab').forEach((el, i) => {
      const tabs = ['geral','os','plantao','vendas','areceber','comissoes','gastos','vales','estoque','afiacao'];
      el.classList.toggle('ativa', tabs[i] === tab);
    });
    const content = document.getElementById('fin-content');
    content.innerHTML = '<div class="fin-loading">Carregando...</div>';
    const fns = { geral: finGeral, os: finOS, plantao: finPlantao, vendas: finVendas, areceber: finAReceber, comissoes: finComissoes, gastos: finGastos, vales: finVales, estoque: finEstoque, afiacao: finAfiacao, funcionarios: finFuncionarios };
    if (fns[tab]) fns[tab](content);
  }

  function traduzStatus(s) {
    return { aberta:'Aberta', em_andamento:'Em andamento', reagendar:'Reagendar', concluida:'Concluída', cancelada:'Cancelada', pendente:'Pendente', comprado:'Comprado' }[s] || s;
  }

          <option value="concluida" ${prevStatus==='concluida'?'selected':''}>Concluídas</option>
          <option value="cancelada" ${prevStatus==='cancelada'?'selected':''}>Canceladas</option>

  async function finOSCarregar() {
    const el = document.getElementById('fin-os-result');
    if (!el) return;
    el.innerHTML = '<div class="fin-loading">Carregando...</div>';
    const di = document.getElementById('fin-os-di')?.value;
    const df = document.getElementById('fin-os-df')?.value;
    const status = document.getElementById('fin-os-status')?.value || '';
    const q = document.getElementById('fin-os-q')?.value || '';
    try {
      let url = '/ordens?is_plantao=0&';
      if (di) url += 'data_inicio='+di+'&';
      if (df) url += 'data_fim='+df+'&';
      if (status) url += 'status='+status+'&';
      if (q) url += 'q='+encodeURIComponent(q);
      const rows = await reqLoja('GET', url);
      const hoje = new Date().toLocaleDateString('en-CA');
      const totalPeriodo = rows.reduce((s,o) => s + (o.valor||0), 0);
      const rowsHoje = rows.filter(o => o.data_entrada && o.data_entrada.startsWith(hoje));
      const totalHoje = rowsHoje.reduce((s,o) => s + (o.valor||0), 0);
      const concluidas = rows.filter(o => o.status === 'concluida');
      const abertas = rows.filter(o => o.status === 'aberta' || o.status === 'em_andamento');
      el.innerHTML = `
        <div class="stat-grid" style="margin-bottom:16px">
          <div class="stat-card destaque"><div class="stat-label">Total no período</div><div class="stat-val">${fmtV(totalPeriodo)}</div><div class="stat-sub">${rows.length} OS</div></div>
          <div class="stat-card"><div class="stat-label">Total hoje</div><div class="stat-val">${fmtV(totalHoje)}</div><div class="stat-sub">${rowsHoje.length} OS</div></div>
          <div class="stat-card ok"><div class="stat-label">Concluídas</div><div class="stat-val">${concluidas.length}</div><div class="stat-sub">${fmtV(concluidas.reduce((s,o)=>s+(o.valor||0),0))}</div></div>
          <div class="stat-card alerta"><div class="stat-label">Em aberto</div><div class="stat-val">${abertas.length}</div><div class="stat-sub">${fmtV(abertas.reduce((s,o)=>s+(o.valor||0),0))}</div></div>
        </div>
        ${rows.length ? `
        <div class="fin-table-wrap">
          <table class="fin-table">
            <thead><tr><th>Número</th><th>Cliente</th><th>Descrição</th><th>Status</th><th>Valor</th><th>Pagamento</th><th>Data</th></tr></thead>
            <tbody>${rows.map(o => `
              <tr>
                <td class="n">${o.numero}</td>
                <td>${esc(o.cliente_nome||o.cliente_nome_avulso||'—')}</td>
                <td>${esc(o.descricao||'')}</td>
                <td><span class="st-badge st-${o.status}">${traduzStatus(o.status)}</span></td>
                <td>${fmtV(o.valor)}</td>
                <td>${esc(o.forma_pagamento||'—')}</td>
                <td>${fmtDH(o.data_entrada)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : '<div class="fin-empty">Nenhuma OS encontrada</div>'}`;
    } catch (e) { el.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  // ── Tab: Vendas ──────────────────────────────────────────────────────────
  async function finPlantao(el) {
    const hoje = new Date().toLocaleDateString('en-CA');
    const inicioMes = hoje.slice(0,7)+'-01';
    const prevDi = document.getElementById('fin-plantao-di')?.value || inicioMes;
    const prevDf = document.getElementById('fin-plantao-df')?.value || hoje;
    const prevQ  = document.getElementById('fin-plantao-q')?.value  || '';
    el.innerHTML = `
      <div class="fin-filtros">
        <input type="date" id="fin-plantao-di" value="${prevDi}">
        <input type="date" id="fin-plantao-df" value="${prevDf}">

        <button class="fin-btn" onclick="finPlantaoCarregar()">Buscar</button>

  }

  async function finPlantaoCarregar() {
    const el = document.getElementById('fin-plantao-result');
    if (!el) return;
    el.innerHTML = '<div class="fin-loading">Carregando...</div>';
    const di = document.getElementById('fin-plantao-di')?.value;
    const df = document.getElementById('fin-plantao-df')?.value;
    const q  = document.getElementById('fin-plantao-q')?.value  || '';
    try {
      let url = '/ordens?is_plantao=1&';
      if (di) url += 'data_inicio='+di+'&';
      if (df) url += 'data_fim='+df+'&';
      if (q)  url += 'q='+encodeURIComponent(q);
      const [rows, vends] = await Promise.all([
        reqLoja('GET', url),
        reqLoja('GET', '/vendedores')
      ]);
      const vendMap = {};
      vends.forEach(v => { vendMap[v.id] = v; });

      const calcLucro = o => {
        if (o.status !== 'concluida') return null;
        const valor = o.valor || 0;
        const custo = o.custo_materiais || 0;
        const percPlantao = vendMap[o.vendedor_id]?.percentual_plantao || 0;
        const comissao = valor * percPlantao / 100;
        return { valor, custo, comissao, percPlantao, liquido: valor - custo - comissao };
      };

      const concluidas = rows.filter(o => o.status === 'concluida');
      const abertas    = rows.filter(o => o.status === 'aberta' || o.status === 'em_andamento');
      const totalBruto = concluidas.reduce((s,o) => s+(o.valor||0), 0);
      const totalCusto = concluidas.reduce((s,o) => s+(o.custo_materiais||0), 0);
      const totalComis = concluidas.reduce((s,o) => {
        const v = o.valor||0; const p = vendMap[o.vendedor_id]?.percentual_plantao||0;
        return s + v*p/100;
      }, 0);
      const totalLiq   = totalBruto - totalCusto - totalComis;

      el.innerHTML = `
        <div style="background:#3b0764;border:1px solid #6d28d9;border-radius:12px;padding:12px 16px;margin-bottom:16px;color:#e9d5ff;font-size:13px">
          🌙 <strong>Plantões</strong> são contabilizados separadamente e <strong>não entram no fechamento geral</strong>.
        </div>
        <div class="stat-grid" style="margin-bottom:16px">
          <div class="stat-card destaque"><div class="stat-label">Faturado (concluídas)</div><div class="stat-val">${fmtV(totalBruto)}</div><div class="stat-sub">${concluidas.length} OS</div></div>
          <div class="stat-card alerta"><div class="stat-label">Custo materiais</div><div class="stat-val">${fmtV(totalCusto)}</div><div class="stat-sub">abatido do lucro</div></div>
          <div class="stat-card alerta"><div class="stat-label">Comissão plantão</div><div class="stat-val">${fmtV(totalComis)}</div><div class="stat-sub">abatido do lucro</div></div>
          <div class="stat-card ok"><div class="stat-label">Lucro líquido</div><div class="stat-val">${fmtV(totalLiq)}</div><div class="stat-sub">${abertas.length} em aberto</div></div>
        </div>
        ${rows.length ? `
        <div class="fin-table-wrap">
          <table class="fin-table">
            <thead><tr><th>Número</th><th>Cliente</th><th>Endereço</th><th>Funcionário</th><th>Status</th><th>Valor</th><th>Custo mat.</th><th>Comissão</th><th>Lucro</th><th>Data</th></tr></thead>
            <tbody>${rows.map(o => {
              const l = calcLucro(o);
              return `
              <tr>
                <td class="n">${o.numero} <span style="font-size:10px;background:#6d28d9;color:#e9d5ff;padding:1px 5px;border-radius:4px">🌙</span></td>
                <td>${esc(o.cliente_nome||o.cliente_nome_avulso||'—')}</td>
                <td style="font-size:12px;color:#94a3b8">${esc([o.cliente_avulso_rua,o.cliente_avulso_numero,o.cliente_avulso_cidade].filter(Boolean).join(', '))||'—'}</td>
                <td>${esc(o.vendedor_nome||'—')}${l&&l.percPlantao?`<br><span style="font-size:11px;color:#7c3aed">${l.percPlantao}% plantão</span>`:''}
                </td>
                <td><span class="st-badge st-${o.status}">${traduzStatus(o.status)}</span></td>
                <td>${fmtV(o.valor)}</td>
                <td style="color:${o.custo_materiais>0?'#dc2626':'#94a3b8'}">${fmtV(o.custo_materiais||0)}</td>
                <td style="color:${l&&l.comissao>0?'#d97706':'#94a3b8'}">${l ? fmtV(l.comissao) : '—'}</td>
                <td style="font-weight:600;color:${l&&l.liquido>=0?'#059669':'#dc2626'}">${l ? fmtV(l.liquido) : '—'}</td>
                <td>${fmtDH(o.data_entrada)}</td>
              </tr>`;
            }).join('')}
            </tbody>
          </table>
        </div>` : '<div class="fin-empty">Nenhum plantão encontrado neste período</div>'}`;
    } catch (e) { el.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  async function finVendas(el) {
    const hoje = new Date().toLocaleDateString('en-CA');
    const inicioMes = hoje.slice(0,7)+'-01';
    el.innerHTML = `
      <div class="fin-filtros">
        <input type="date" id="fin-v-di" value="${inicioMes}">
        <input type="date" id="fin-v-df" value="${hoje}">

          ${r.funcionarios.map(f => {
            const bruto = (f.salario_base||0)+(f.comissao||0)+(f.bonus||0);
            const liquido = f.total_a_pagar||0;
            const temVale = (f.vales||0) > 0;
            const atingiuMeta = f.meta > 0 && f.total_os >= f.meta;
            return `<div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px">
              <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #334155">👤 ${esc(f.nome)}</div>
              ${f.salario_base > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#94a3b8">💼 Salário base</span><span>${fmtV(f.salario_base)}</span></div>` : ''}
              ${f.comissao > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#94a3b8">📊 Comissão (${f.percentual_comissao}% · ${f.qtd_os} OS)</span><span style="color:#34d399">+${fmtV(f.comissao)}</span></div>` : ''}
              ${f.meta > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#94a3b8">🎯 Meta ${fmtV(f.meta)}</span><span style="color:${atingiuMeta?'#34d399':'#64748b'}">${atingiuMeta?'✔ Atingida':'Não atingida'}</span></div>` : ''}
              ${atingiuMeta && f.bonus_meta > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#94a3b8">🏆 Bônus meta</span><span style="color:#34d399">+${fmtV(f.bonus_meta)}</span></div>` : ''}
              ${bruto > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;padding-top:5px;border-top:1px solid #334155"><span style="color:#94a3b8">Bruto</span><span style="font-weight:600">${fmtV(bruto)}</span></div>` : ''}
              ${temVale ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:#f87171">➖ Vales descontados</span><span style="color:#f87171">-${fmtV(f.vales)}</span></div>` : ''}
              ${(f.excedente||0)>0 ? `<div style="background:#450a0a;border:1px solid #ef4444;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px;color:#fca5a5">⚠️ Vale excede salário em ${fmtV(f.excedente)} — prejuízo contabilizado no lucro líquido</div>` : ''}
              <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-top:8px;border-top:1px solid #334155;margin-top:4px">
                <span style="color:#94a3b8">${(f.excedente||0)>0?'⚠️ Devendo':'✅ Pagamento'}</span>
                <span style="color:${(f.excedente||0)>0?'#f87171':'#34d399'}">${fmtV(liquido)}</span>
              </div>
            </div>`;
          }).join('')}
        </div>` : ''}

        ${data.list?.length ? `
        <div class="fin-section-title">Movimentações do Período</div>
        <div class="fin-table-wrap"><table class="fin-table">
          <thead><tr><th>Tipo</th><th>Nº</th><th>Data</th><th>Cliente</th><th>Técnico</th><th>Pagamento</th><th>Total</th></tr></thead>
          <tbody>${data.list.map(v=>`<tr>
            <td><span style="background:${v.tipo==='venda'?'#dbeafe':'#d1fae5'};color:${v.tipo==='venda'?'#1e40af':'#065f46'};padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${v.tipo.toUpperCase()}</span></td>
            <td class="n">${v.numero}</td><td>${fmtDT(v.data)}</td>
            <td>${esc(v.cliente_nome||v.cliente_nome_avulso||'—')}</td>
            <td>${esc(v.vendedor_nome||'—')}</td>
            <td>${_finBadgePag(v.forma_pagamento)}</td>
            <td>${fmtV(v.valor)}</td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<div class="fin-empty">Nenhuma movimentação no período</div>'}`;
    } catch(e) { res.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  // ── Tab: Vales ───────────────────────────────────────────────────────────
  async function finVales(el) {
    const now = new Date();
    const mes = String(now.getMonth()+1).padStart(2,'0');
    const ano = now.getFullYear();
    el.innerHTML = `
      <div class="fin-filtros">
        <select id="fin-vales-mes" style="background:#1e293b;color:#f1f5f9;border:1.5px solid #334155;border-radius:8px;padding:6px 12px;font-size:13px">
          ${['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
            .map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${String(i+1).padStart(2,'0')===mes?'selected':''}>${m}</option>`).join('')}
        </select>
        <input type="number" id="fin-vales-ano" value="${ano}" min="2020" max="2099" style="background:#1e293b;color:#f1f5f9;border:1.5px solid #334155;border-radius:8px;padding:6px 12px;font-size:13px;width:90px">
        <button class="fin-btn" onclick="finValesCarregar()">Buscar</button>
      </div>
      <div id="fin-vales-res"><div class="fin-loading">Carregando...</div></div>`;
    finValesCarregar();
  }

  async function finValesCarregar() {
    const mes = document.getElementById('fin-vales-mes')?.value;
    const ano = document.getElementById('fin-vales-ano')?.value;
    const res = document.getElementById('fin-vales-res');
    if (!res||!mes||!ano) return;
    res.innerHTML = '<div class="fin-loading">Carregando...</div>';
    try {
      const [vales, resumo] = await Promise.all([
        reqLoja('GET', `/vales?mes=${mes}&ano=${ano}`),
        reqLoja('GET', `/vales/resumo?mes=${mes}&ano=${ano}`)
      ]);
      const total = resumo.reduce((s,r)=>s+r.total_vales,0);
      res.innerHTML = `
        <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
          <span style="color:#94a3b8;font-size:13px">Total de Vales no Período</span>
          <strong style="font-size:20px;color:#f87171">${fmtV(total)}</strong>
        </div>
        ${resumo.length ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          ${resumo.map(r=>`<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 16px">
            <div style="font-size:11px;color:#94a3b8;font-weight:600">👤 ${esc(r.vendedor_nome)}</div>
            <div style="font-size:15px;font-weight:700;color:#f87171">${fmtV(r.total_vales)}</div>
          </div>`).join('')}
        </div>` : ''}
        ${vales.length ? `<div class="fin-table-wrap"><table class="fin-table">
          <thead><tr><th>Funcionário</th><th>Descrição</th><th>Valor</th><th>Data</th></tr></thead>
          <tbody>${vales.map(v=>`<tr>
            <td>${esc(v.vendedor_nome)}</td>
            <td>${esc(v.descricao||'—')}</td>
            <td style="color:#f87171;font-weight:600">${fmtV(v.valor)}</td>
            <td>${fmtDT(v.data)}</td>
          </tr>`).join('')}</tbody>
        </table></div>` : '<div class="fin-empty">Nenhum vale no período</div>'}`;
    } catch(e) { res.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  // ── Tab: Estoque ─────────────────────────────────────────────────────────
  async function finEstoque(el) {
    el.innerHTML = '<div class="fin-loading">Carregando...</div>';
    try {
      const data = await reqLoja('GET', '/relatorios/estoque');
      el.innerHTML = `
        <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
          <span style="color:#94a3b8;font-size:13px">Valor Total em Estoque</span>
          <strong style="font-size:20px;color:#34d399">${fmtV(data.valor_total)}</strong>
        </div>
        <div class="fin-table-wrap"><table class="fin-table">
          <thead><tr><th>Produto</th><th>Estoque</th><th>Est. Mínimo</th><th>Preço Venda</th><th>Valor Total</th><th>Status</th></tr></thead>
          <tbody>${(data.produtos||[]).map(p=>`<tr>
            <td>${esc(p.nome)}</td>
            <td style="${p.estoque<=p.estoque_minimo?'color:#f87171;font-weight:700':''}">${p.estoque} ${p.unidade||''}</td>
            <td>${p.estoque_minimo}</td>
            <td>${fmtV(p.preco_venda)}</td>
            <td>${fmtV(p.valor_total)}</td>
            <td>${p.estoque<=p.estoque_minimo?'<span style="background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">⚠ Baixo</span>':'<span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">OK</span>'}</td>
          </tr>`).join('')}</tbody>
        </table></div>`;
    } catch(e) { el.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  // ── Tab: Afiação ─────────────────────────────────────────────────────────
  async function finAfiacao(el) {
    const hoje = new Date().toLocaleDateString('en-CA');
    const inicioMes = hoje.slice(0,7)+'-01';
    const prevDi = document.getElementById('fin-af-di')?.value || inicioMes;
    const prevDf = document.getElementById('fin-af-df')?.value || hoje;
    el.innerHTML = `
      <div class="fin-filtros">
        <input type="date" id="fin-af-di" value="${prevDi}">
        <input type="date" id="fin-af-df" value="${prevDf}">
        <button class="fin-btn" onclick="finAfiacaoCarregar()">Buscar</button>
      </div>
      <div id="fin-af-result"><div class="fin-loading">Carregando...</div></div>`;
    finAfiacaoCarregar();
  }

  async function finAfiacaoCarregar() {
    const el = document.getElementById('fin-af-result');
    if (!el) return;
    el.innerHTML = '<div class="fin-loading">Carregando...</div>';
    const di = document.getElementById('fin-af-di')?.value;
    const df = document.getElementById('fin-af-df')?.value;
    try {
      const d = await reqLoja('GET', `/afiacao/relatorio?data_inicio=${di}&data_fim=${df}`);
      const fmt = v => 'R$ ' + Number(v||0).toFixed(2).replace('.', ',');
      const fmtDt = s => { if (!s) return '—'; const [y,m,dia] = String(s).slice(0,10).split('-'); return `${dia}/${m}/${y}`; };
      el.innerHTML = `
        <div class="fin-stats">
          <div class="stat-card"><div class="stat-label">Fichas entregues</div><div class="stat-val">${d.qtd_entregues}</div></div>
          <div class="stat-card"><div class="stat-label">Em fila (ativas)</div><div class="stat-val">${d.em_fila}</div></div>
          <div class="stat-card"><div class="stat-label">Total cobrado</div><div class="stat-val">${fmt(d.total_cobrado)}</div></div>
          <div class="stat-card"><div class="stat-label">Custo afiador</div><div class="stat-val">${fmt(d.total_afiador)}</div></div>
          <div class="stat-card destaque"><div class="stat-label">Lucro afiação</div><div class="stat-val">${fmt(d.lucro)}</div></div>
        </div>
        ${d.fichas.length === 0 ? '<p class="fin-vazio">Nenhuma ficha entregue no período</p>' : `
        <table class="fin-table">
          <thead><tr><th>#</th><th>Cliente</th><th>Qtd</th><th>Observação</th><th>Valor</th><th>Entregue em</th></tr></thead>
          <tbody>
            ${d.fichas.map(f => `
              <tr>
                <td>#${f.numero}</td>
                <td>${f.cliente_nome || '—'}</td>
                <td>${f.quantidade}</td>
                <td>${f.observacao || '—'}</td>
                <td>${fmt(f.valor)}</td>
                <td>${fmtDt(f.data_entrega)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`}`;
    } catch(e) { el.innerHTML = `<p style="color:#ef4444">Erro ao carregar: ${e.message}</p>`; }
  }

  // ── Tab: Funcionários ────────────────────────────────────────────────────
  async function finFuncionarios(el) {
    el.innerHTML = '<div class="fin-loading">Carregando...</div>';
    try {
      const list = await reqLoja('GET', '/vendedores');
      el.innerHTML = `
        <div style="margin-bottom:16px;font-size:13px;color:#94a3b8;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 16px">
          👑 Configure aqui quais funcionários têm acesso ao <strong style="color:#a78bfa">Painel Admin</strong> no app. Esta configuração é exclusiva desta tela.
        </div>
        <div class="fin-table-wrap"><table class="fin-table">
          <thead><tr><th>Nome</th><th>App</th><th>Admin App</th><th>Pode receber OS</th><th>Ação</th></tr></thead>
          <tbody id="admin-func-tbody">
            ${list.map(v => `
              <tr id="func-row-${v.id}">
                <td style="font-weight:600">${esc(v.nome)}</td>
                <td>${v.email ? `<span style="color:#34d399;font-size:12px">✔ ${esc(v.email)}</span>` : '<span style="color:#475569;font-size:12px">—</span>'}</td>
                <td>
                  <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                    <input type="checkbox" onchange="adminToggleFuncionario(${v.id})" id="adm-chk-${v.id}" ${v.is_admin ? 'checked' : ''}
                      style="width:18px;height:18px;accent-color:#7c3aed;cursor:pointer">
                    ${v.is_admin ? '<span style="background:#f3e8ff;color:#7c3aed;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">👑 Admin</span>' : '<span style="color:#475569;font-size:12px">—</span>'}
                  </label>
                </td>
                <td id="adm-trab-${v.id}">
                  ${v.is_admin ? `
                  <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                    <input type="checkbox" onchange="adminToggleTrabalhar(${v.id})" id="adm-trab-chk-${v.id}" ${v.pode_trabalhar !== 0 ? 'checked' : ''}
                      style="width:18px;height:18px;accent-color:#10b981;cursor:pointer">
                    <span style="font-size:12px;color:#94a3b8">${v.pode_trabalhar !== 0 ? 'Sim' : 'Não'}</span>
                  </label>` : '<span style="color:#475569;font-size:12px">—</span>'}
                </td>
                <td id="adm-status-${v.id}" style="font-size:12px;color:#94a3b8"></td>
              </tr>`).join('')}
          </tbody>
        </table></div>`;
    } catch(e) { el.innerHTML = `<div class="fin-empty">${e.message}</div>`; }
  }

  async function adminToggleFuncionario(id) {
    const chk = document.getElementById(`adm-chk-${id}`);
    const isAdmin = chk.checked ? 1 : 0;
    const statusEl = document.getElementById(`adm-status-${id}`);
    const trabEl = document.getElementById(`adm-trab-${id}`);
    try {
      await reqLoja('PUT', `/vendedores/${id}/admin`, { is_admin: isAdmin, pode_trabalhar: 1 });
      statusEl.textContent = 'Salvo ✔';
      trabEl.innerHTML = isAdmin ? `
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" onchange="adminToggleTrabalhar(${id})" id="adm-trab-chk-${id}" checked
            style="width:18px;height:18px;accent-color:#10b981;cursor:pointer">
          <span style="font-size:12px;color:#94a3b8">Sim</span>
        </label>` : '<span style="color:#475569;font-size:12px">—</span>';
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
    } catch(e) { chk.checked = !chk.checked; statusEl.textContent = 'Erro'; }
  }

  async function adminToggleTrabalhar(id) {
    const chk = document.getElementById(`adm-trab-chk-${id}`);
    const pode = chk.checked ? 1 : 0;
    const statusEl = document.getElementById(`adm-status-${id}`);
    try {
      await reqLoja('PUT', `/vendedores/${id}/admin`, { pode_trabalhar: pode });
      chk.nextElementSibling.textContent = pode ? 'Sim' : 'Não';
      statusEl.textContent = 'Salvo ✔';
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
    } catch(e) { chk.checked = !chk.checked; statusEl.textContent = 'Erro'; }
  }

  // ── Config / Senha Admin ─────────────────────────────────────────────────
  function abrirConfig() {
    document.getElementById('cfg-senha-atual').value = '';
    document.getElementById('cfg-senha-nova').value = '';
    document.getElementById('cfg-senha-conf').value = '';
    document.getElementById('cfg-erro').style.display = 'none';
    document.getElementById('modal-config').style.display = 'flex';
    setTimeout(() => document.getElementById('cfg-senha-atual').focus(), 50);
  }

  function fecharConfig() {
    document.getElementById('modal-config').style.display = 'none';
  }

  async function salvarSenhaAdmin() {
    const atual = document.getElementById('cfg-senha-atual').value;
    const nova  = document.getElementById('cfg-senha-nova').value;
    const conf  = document.getElementById('cfg-senha-conf').value;
    const erroEl = document.getElementById('cfg-erro');
    erroEl.style.display = 'none';
    if (!atual || !nova || !conf) { erroEl.textContent = 'Preencha todos os campos'; erroEl.style.display = ''; return; }
    if (nova !== conf) { erroEl.textContent = 'As senhas não coincidem'; erroEl.style.display = ''; return; }
    if (nova.length < 6) { erroEl.textContent = 'Senha deve ter pelo menos 6 caracteres'; erroEl.style.display = ''; return; }
    try {
      const res = await fetch(API + '/auth/admin-senha', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token },
        body: JSON.stringify({ senha_atual: atual, senha_nova: nova })
      });
      const data = await res.json();
      if (!res.ok) { erroEl.textContent = data.error || 'Erro ao alterar senha'; erroEl.style.display = ''; return; }
      fecharConfig();
      toast('Senha alterada com sucesso!');
    } catch(e) { erroEl.textContent = 'Erro de conexão'; erroEl.style.display = ''; }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  document.getElementById('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
  document.getElementById('l-usuario').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('l-senha').focus(); });
  document.getElementById('btn-entrar').addEventListener('click', fazerLogin);

  if (_token) {
    fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + _token } })
      .then(r => r.ok ? r.json() : null)
      .then(u => {
        if (u && u.perfil === 'admin') { _user = u; entrarNoPainel(); }
        else { sessionStorage.removeItem('admin_token'); _token = null; }
      }).catch(() => { sessionStorage.removeItem('admin_token'); _token = null; });
  }
</script>
</body>
</html>
