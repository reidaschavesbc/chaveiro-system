<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaveiro - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f1b47 0%, #1a56db 50%, #0f1b47 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 50px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a56db, #3b82f6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(26, 86, 219, 0.4);
    }

    .login-logo .icon svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .login-logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0;
    }

    .login-logo p {
      color: #64748b;
      font-size: 14px;
      margin: 4px 0 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
      box-sizing: border-box;
      outline: none;
    }

    .form-group input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 4px rgba(26, 86, 219, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a56db, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(26, 86, 219, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .ver {
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12.65 10A6 6 0 1 0 22 13h-2a4 4 0 1 1-3.79-5.23L18 9.56V8h2V4h-2v2h-2v2l-3.35-.01zM7 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" />
        </svg>
      </div>
      <h1 id="empresa-nome">Sistema Chaveiro</h1>
      <p>Gestão completa do seu negócio</p>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>
    <p class="ver">v1.0.0</p>
  </div>
  <script>
    // Check already logged in
    if (localStorage.getItem('token')) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
        .then(r => r.ok ? window.location.href = '/app.html' : null).catch(() => { });
    }
    // Try load empresa name
    fetch('/api/config').then(r => r.json()).then(c => {
      if (c.empresa_nome) document.getElementById('empresa-nome').textContent = c.empresa_nome;
    }).catch(() => { });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      btn.textContent = 'Entrando...'; btn.disabled = true; errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario: document.getElementById('usuario').value, senha: document.getElementById('senha').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/app';
      } catch (err) {
        errEl.textContent = err.message; errEl.style.display = 'block';
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
