<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaveiro - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f1b47 0%, #1a56db 50%, #0f1b47 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGIN CARD ── */
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 44px 40px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
    }

    .login-logo { text-align: center; margin-bottom: 32px; }

    .login-logo .icon {
      width: 80px; height: 80px;
      margin: 0 auto 16px;
    }

    .login-logo .icon img { width: 80px; height: 80px; display: block; }
    .login-logo h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin: 0; }
    .login-logo p  { color: #64748b; font-size: 14px; margin: 4px 0 0; }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }

    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 15px; font-family: inherit;
      transition: all 0.2s; outline: none;
    }

    .form-group input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 4px rgba(26, 86, 219, 0.1);
    }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1a56db, #3b82f6);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }

    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(26, 86, 219, 0.4); }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }

    .ver { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 12px; }

    /* ── DOWNLOAD CARD ── */
    .download-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 20px 24px;
      animation: slideUp 0.5s ease 0.1s both;
    }

    .download-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .download-app-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .download-app-icon img { width: 48px; height: 48px; display: block; }

    .download-app-info { flex: 1; }

    .download-app-name {
      font-size: 15px; font-weight: 700;
      color: #ffffff; line-height: 1.2;
    }

    .download-app-sub {
      font-size: 12px; color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .download-version {
      background: rgba(240, 192, 64, 0.15);
      border: 1px solid rgba(240, 192, 64, 0.3);
      color: #f0c040;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .btn-download-win {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%; padding: 13px 20px;
      background: linear-gradient(135deg, #0078d4, #106ebe);
      color: white; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 120, 212, 0.4);
    }

    .btn-download-win:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0, 120, 212, 0.55);
      background: linear-gradient(135deg, #106ebe, #005a9e);
    }

    .btn-download-win:active { transform: translateY(0); }

    .btn-download-win .win-logo { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-download-android {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%; padding: 13px 20px;
      background: linear-gradient(135deg, #3ddc84, #00aa55);
      color: white; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; margin-top: 10px;
      box-shadow: 0 4px 20px rgba(61, 220, 132, 0.35);
    }

    .btn-download-android:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(61, 220, 132, 0.5);
      background: linear-gradient(135deg, #00aa55, #008844);
    }

    .btn-download-android:active { transform: translateY(0); }

    .btn-download-android svg { width: 18px; height: 18px; flex-shrink: 0; }

    .download-chips {
      display: flex; gap: 8px; margin-top: 14px;
      flex-wrap: wrap;
    }

    .chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.65);
    }

    .chip svg { width: 11px; height: 11px; stroke: rgba(255,255,255,0.55); }
  </style>
</head>

<body>
  <div class="page-wrapper">

    <!-- LOGIN CARD -->
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">
          <img src="/logo.png" alt="Logo">
        </div>
        <h1 id="empresa-nome">Sistema Chaveiro</h1>
        <p>Gestão completa do seu negócio</p>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-login">Entrar</button>
      </form>
      <p class="ver" id="ver-web">v1.0.0</p>
    </div>

    <!-- DOWNLOAD CARD -->
    <div class="download-card">
      <div class="download-header">
        <div class="download-app-icon">
          <img src="/logo.png" alt="Logo">
        </div>
        <div class="download-app-info">
          <div class="download-app-name">Chaveiro Desktop</div>
          <div class="download-app-sub">Windows 10 / 11 &nbsp;·&nbsp; 64-bit</div>
        </div>
        <span class="download-version" id="ver-desktop">v1.0.0</span>
      </div>

      <a href="/download" class="btn-download-win">
        <!-- Windows logo -->
        <svg class="win-logo" viewBox="0 0 88 88" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 12.4L35.7 7.6V42H0V12.4Z"/>
          <path d="M40.3 6.9L88 0V42H40.3V6.9Z"/>
          <path d="M0 46H35.7V80.3L0 75.5V46Z"/>
          <path d="M40.3 46H88V88L40.3 81.1V46Z"/>
        </svg>
        Baixar para Windows
      </a>

      <a href="/download-app" class="btn-download-android">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.463 11.463 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.28.18-.37.54-.2.83L6.4 9.48A10.78 10.78 0 0 0 1 18h22a10.78 10.78 0 0 0-5.4-8.52zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/>
        </svg>
        Baixar App Android
      </a>

      <div class="download-chips">
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          Atualizações automáticas
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Funciona sem navegador
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          Dados locais seguros
        </span>
      </div>
    </div>

  </div>

  <script>
    if (window.electron) {
      document.querySelector('.download-card').style.display = 'none';
    }

    if (localStorage.getItem('token')) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
        .then(r => r.ok ? r.json() : null)
        .then(u => { if (u) window.location.href = u.perfil === 'afiador' ? '/afiador' : '/app'; })
        .catch(() => {});
    }

    fetch('/api/config').then(r => r.json()).then(c => {
      if (c.empresa_nome) document.getElementById('empresa-nome').textContent = c.empresa_nome;
    }).catch(() => {});

    fetch('/api/version').then(r => r.json()).then(d => {
      const v = 'v' + d.version;
      document.getElementById('ver-web').textContent = v;
      document.getElementById('ver-desktop').textContent = v;
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      btn.textContent = 'Entrando...'; btn.disabled = true; errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario: document.getElementById('usuario').value, senha: document.getElementById('senha').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.perfil === 'afiador' ? '/afiador' : '/app';
      } catch (err) {
        errEl.textContent = err.message; errEl.style.display = 'block';
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
